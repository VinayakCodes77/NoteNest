<!DOCTYPE html>
<html>
<head>
    <title>Private Diary</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: #4a90e2; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .entry { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #4a90e2; }
        .logout-btn { color: #ff4757; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Hi, {{ user.username }}!</h1>
            <form action="{% url 'logout' %}" method="post">{% csrf_token %}<button type="submit" class="logout-btn" style="background:none; width:auto;">Logout</button></form>
        </div>

        <div class="card">
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="title" placeholder="Title" required>
                <textarea name="description" placeholder="Your secret thoughts..." rows="4" required></textarea>
                <button type="submit">Save to Database</button>
            </form>
        </div>

        {% for entry in entries %}
        <div class="entry">
            <h3>{{ entry.title }}</h3>
            <p>{{ entry.description }}</p>
            <small>{{ entry.created_at }}</small>
        </div>
        {% endfor %}
    </div>
</body>
</html>
